name: lint

# Fast, deterministic, source-only checks that need no build toolchain, so
# they can gate every PR. Add new dev-utils/lint/*.sh checks as steps here.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  plugin-descriptions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint plugin Plugins-page descriptions
        # The Plugins page renders each plugin's Description verbatim as its
        # title; this fails the build on a multi-line or over-long one.
        run: sh dev-utils/lint/check_plugin_descriptions.sh .
